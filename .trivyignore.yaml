# Suppressions for the CI vulnerability gate (.github/workflows/ci.yml).
#
# Scope: ONLY vulnerabilities in the Debian base image that have no upstream fix
# available (Trivy status: affected / fix_deferred / will_not_fix). Bumping the
# node base image cannot resolve these — there is no patched package to move to.
#
# These are suppressed at the GATE only. They still appear in full in the job
# summary and in the Security tab, so visibility is never lost.
#
# Anything with a FixedVersion must NOT be added here — fix those by bumping the
# base image instead.
#
# Every entry expires 2026-10-22. On that date the gate starts failing on them
# again, forcing a re-review of whether Debian has since shipped a fix.

