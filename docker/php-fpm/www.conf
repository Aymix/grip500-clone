; ⚠️  DEMO FIXTURE — INTENTIONALLY INSECURE. DO NOT DEPLOY.
;
; A php-fpm pool config written the wrong way on purpose.
;
; Worth knowing for the demo: Trivy's misconfiguration engine has no built-in
; ruleset for php-fpm .conf (ini) files — it targets Dockerfile, Kubernetes,
; Terraform, CloudFormation, Helm and friends. Nothing in THIS file is flagged
; by the scan. The 7 findings in the "php-fpm config scan" table all come from
; the Dockerfile next to it. This file is here as the realistic artifact that
; Dockerfile deploys, and to make the point that a config scanner only covers
; the formats it has checks for — a genuinely dangerous pool config like this
; one sails straight through.

[www]

; Running the pool as root: a PHP RCE becomes an instant root compromise.
user = root
group = root

; Listening on all interfaces instead of a unix socket or 127.0.0.1 — the
; FastCGI port is reachable from anywhere on the network.
listen = 0.0.0.0:9000

; No allowed-clients restriction, so any host that can reach the port can
; execute FastCGI requests.
; listen.allowed_clients = 127.0.0.1

; Without security.limit_extensions, php-fpm will happily execute uploaded
; files that merely *look* like PHP. This is the classic image-upload RCE.
security.limit_extensions =

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35

; Leaks internal paths, queries, and stack traces to end users.
php_admin_flag[display_errors] = on
php_admin_flag[log_errors] = off

; Status and ping endpoints exposed without any access control.
pm.status_path = /status
ping.path = /ping

; Hardcoded credential — this is what the Trivy secret scanner picks up.
; Fake value, present only so the demo scan has something to report.
env[DB_PASSWORD] = "hunter2-demo-not-a-real-password"
