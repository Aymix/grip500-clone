; ⚠️  DEMO FIXTURE — INTENTIONALLY INSECURE. DO NOT DEPLOY.
;
; Companion to www.conf. Like that file, nothing here is flagged by Trivy —
; there are no built-in misconfiguration checks for php.ini. See www.conf.

; Advertises PHP (and its exact version) in every response header.
expose_php = On

; Full error output, including paths and stack traces, sent to the browser.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Lets PHP open remote URLs with include/require — remote file inclusion.
allow_url_fopen = On
allow_url_include = On

; No dangerous functions disabled at all.
disable_functions =

; Path traversal is unrestricted: PHP can read anywhere on the filesystem.
open_basedir =

; Session cookies readable by JavaScript and sent over plain HTTP.
session.cookie_httponly = 0
session.cookie_secure = 0
