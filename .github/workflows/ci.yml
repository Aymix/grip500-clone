name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t grip500-clone:${{ github.sha }} .

      # Hand the exact image we just built to the trivy job, so it scans that
      # artifact rather than rebuilding a lookalike.
      - name: Export Docker image
        run: docker save grip500-clone:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  trivy:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c image.tar.gz | docker load

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0

      # One scan, three consumers: the JSON report is converted into a SARIF
      # upload, a job summary table, and the pass/fail gate below.
      #
      # --ignorefile /dev/null opts the scan out of auto-discovering
      # .trivyignore.yaml, so the report stays complete. Suppressions are applied
      # only at the gate — the summary and Security tab always show everything.
      - name: Scan image with Trivy
        run: |
          trivy image \
            --scanners vuln,secret \
            --format json \
            --output trivy.json \
            --ignorefile /dev/null \
            --exit-code 0 \
            grip500-clone:${{ github.sha }}

      - name: Publish Trivy results to job summary
        if: always()
        run: |
          if [ ! -f trivy.json ]; then
            echo "## 🛡️ Trivy scan" >> "$GITHUB_STEP_SUMMARY"
            echo "Scan did not produce a report — check the scan step logs." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## 🛡️ Trivy scan — \`grip500-clone:${GITHUB_SHA:0:7}\`"
            echo ""

            jq -r '
              [.Results[]?.Vulnerabilities[]?] as $v
              | "| Severity | Count |",
                "| --- | ---: |",
                "| 🔴 CRITICAL | \([$v[] | select(.Severity == "CRITICAL")] | length) |",
                "| 🟠 HIGH | \([$v[] | select(.Severity == "HIGH")] | length) |",
                "| 🟡 MEDIUM | \([$v[] | select(.Severity == "MEDIUM")] | length) |",
                "| ⚪ LOW | \([$v[] | select(.Severity == "LOW")] | length) |",
                "| **Total** | **\($v | length)** |"
            ' trivy.json

            echo ""

            # Detail table, HIGH/CRITICAL only — the ones that gate the build.
            count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | length' trivy.json)
            if [ "$count" -gt 0 ]; then
              echo "<details open><summary><b>$count HIGH/CRITICAL findings</b></summary>"
              echo ""
              jq -r '
                "| Severity | Package | Installed | Fixed in | Vulnerability |",
                "| --- | --- | --- | --- | --- |",
                ( [.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")]
                  | sort_by(.Severity)
                  | .[:50][]
                  | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "—") | [\(.VulnerabilityID)](\(.PrimaryURL // "https://nvd.nist.gov/vuln/detail/\(.VulnerabilityID)")) |"
                )
              ' trivy.json
              if [ "$count" -gt 50 ]; then
                echo ""
                echo "_Showing the first 50 of $count. Full list in the Security tab._"
              fi
              echo ""
              echo "</details>"
            else
              echo "✅ No HIGH or CRITICAL vulnerabilities found."
            fi

            echo ""

            # Reflect the gate: of the HIGH/CRITICAL above, how many actually fail
            # the build vs. are suppressed as unfixable.
            if [ -f .trivyignore.yaml ]; then
              ids=$(grep -oE 'CVE-[0-9]{4}-[0-9]+' .trivyignore.yaml | sort -u | jq -R . | jq -sc .)
              suppressed=$(jq --argjson ids "$ids" '
                [ .Results[]?.Vulnerabilities[]?
                  | select((.Severity == "CRITICAL" or .Severity == "HIGH") and (.VulnerabilityID | IN($ids[])))
                ] | length' trivy.json)
              echo "🔕 **$suppressed** of the $count are suppressed by \`.trivyignore.yaml\` — base-image CVEs with no upstream fix, expiring 2026-10-22. **$((count - suppressed))** gate the build."
            fi

            echo ""

            secrets=$(jq '[.Results[]?.Secrets[]?] | length' trivy.json)
            if [ "$secrets" -gt 0 ]; then
              echo "### 🔑 $secrets exposed secret(s)"
              echo ""
              jq -r '
                "| Severity | Rule | File | Line |",
                "| --- | --- | --- | --- |",
                ( .Results[]? as $r | $r.Secrets[]?
                  | "| \(.Severity) | \(.Title) | `\($r.Target)` | \(.StartLine) |"
                )
              ' trivy.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy report
        if: always() && hashFiles('trivy.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.json
          retention-days: 30

      - name: Convert report to SARIF
        if: always() && hashFiles('trivy.json') != ''
        run: trivy convert --format sarif --output trivy.sarif trivy.json

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      # Runs last so the summary and Security tab are populated even when this fails.
      # .trivyignore.yaml suppresses base-image CVEs that have no upstream fix;
      # every entry there carries an expiry date so they get re-reviewed.
      - name: Fail on HIGH/CRITICAL vulnerabilities
        if: always() && hashFiles('trivy.json') != ''
        run: |
          trivy convert \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignorefile .trivyignore.yaml \
            trivy.json
