name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t grip500-clone:${{ github.sha }} .

      # Hand the exact image we just built to the trivy job, so it scans that
      # artifact rather than rebuilding a lookalike.
      - name: Export Docker image
        run: docker save grip500-clone:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  trivy:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c image.tar.gz | docker load

      # ------------------------------------------------------------------
      # Scan 1 of 3 — the application image we just built.
      # ------------------------------------------------------------------
      - name: 'Scan 1/3: app image'
        uses: aquasecurity/trivy-action@0.36.0
        # Opt out of auto-discovering .trivyignore.yaml so the demo table shows
        # every finding, including the unfixable base-image CVEs.
        env:
          TRIVY_IGNOREFILE: /dev/null
        with:
          scan-type: image
          image-ref: grip500-clone:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          output: scan-app.txt
          exit-code: '0'

      # ------------------------------------------------------------------
      # Scan 2 of 3 — php-fpm configuration (misconfiguration scan).
      # Findings come from docker/php-fpm/Dockerfile; Trivy has no built-in
      # checks for .conf/.ini files. See docker/php-fpm/www.conf.
      # ------------------------------------------------------------------
      - name: 'Scan 2/3: php-fpm config'
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: config
          scan-ref: docker/php-fpm
          format: table
          output: scan-phpfpm.txt
          exit-code: '0'

      # ------------------------------------------------------------------
      # Scan 3 of 3 — a third-party base image pulled from Docker Hub.
      # ------------------------------------------------------------------
      - name: 'Scan 3/3: nginx image'
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: nginx:1.29-alpine
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          output: scan-nginx.txt
          exit-code: '0'

      - name: Publish all three scans to the run summary
        if: always()
        run: |
          emit() {
            title="$1"; subtitle="$2"; file="$3"
            echo "## $title"
            echo ""
            echo "_${subtitle}_"
            echo ""
            if [ -s "$file" ]; then
              echo '```'
              cat "$file"
              echo '```'
            else
              echo "✅ Nothing reported."
            fi
            echo ""
          }

          {
            echo "# 🛡️ Trivy — 3 scans"
            echo ""
            emit "1️⃣ App image" \
                 "\`grip500-clone:${GITHUB_SHA:0:7}\` — vulnerabilities, HIGH/CRITICAL only" \
                 scan-app.txt
            emit "2️⃣ php-fpm config" \
                 "\`docker/php-fpm/\` — misconfiguration scan (demo fixture, intentionally insecure)" \
                 scan-phpfpm.txt
            emit "3️⃣ nginx image" \
                 "\`nginx:1.29-alpine\` — vulnerabilities, HIGH/CRITICAL only" \
                 scan-nginx.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw scan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scans
          path: scan-*.txt
          retention-days: 30
          if-no-files-found: ignore
